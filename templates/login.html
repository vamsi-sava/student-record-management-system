<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Student Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #1a1a1a; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 400px; background-color: #262626; border: 2px solid #facc15; border-radius: 12px; }
        .btn-yellow { background-color: #facc15; color: #1a1a1a; font-weight: bold; }
        .btn-yellow:hover { background-color: #eab308; }
    </style>
</head>
<body>
    <div class="card login-card p-4 shadow-lg">
        <div class="text-center mb-4">
            <h5 class="fw-bold tracking-wide">------------------------------------</h5>
            <h4 class="fw-bold text-yellow text-uppercase">STUDENT RECORD MANAGEMENT SYSTEM</h4>
            <h5 class="fw-bold tracking-wide">------------------------------------</h5>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-danger text-center py-2 small fw-bold">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-light">Username:</label>
                <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-light">Password:</label>
                <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <button type="submit" class="btn btn-yellow w-100 py-2">[ Login ]</button>
        </form>
    </div>
</body>
</html>
